version: '3.8'

services:
  database:
    image: mariadb:10.11
    container_name: busywms-db
    environment:
      - MARIADB_ROOT_PASSWORD=Password123!
      - MARIADB_DATABASE=BusyWMS
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./database/schema_mariadb.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: busywms-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_TYPE=MARIADB
      - MARIADB_HOST=database
      - MARIADB_PORT=3306
      - MARIADB_USER=root
      - MARIADB_PASSWORD=Password123!
      - MARIADB_DATABASE=BusyWMS
      - JWT_SECRET=busywms-secret-key-12345
      - JWT_EXPIRES_IN=2h
    depends_on:
      - database

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: busywms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mariadb-data:
